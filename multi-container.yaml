apiVersion: v1

kind: Pod
metadata:
  name: multi-container
  namespace: roboshop
  labels:
    project: roboshop
spec:
  containers: 
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
  - name: almalinux
    image: almalinux:latest
    
    ports:
    - containerPort: 6379
